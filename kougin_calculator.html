<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平均工賃計算ツール｜就労継続支援B型</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f4f6f9;
    color: #2d3142;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    max-width: 860px;
    margin: 0 auto 2rem;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #1a56a0;
  }

  header p {
    font-size: 0.85rem;
    color: #6b7280;
    margin-top: 4px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    margin-bottom: 1.5rem;
  }

  .card h2 {
    font-size: 0.95rem;
    font-weight: 700;
    color: #1a56a0;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid #e8f0fb;
  }

  .note {
    font-size: 0.8rem;
    color: #6b7280;
    margin-bottom: 1rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  thead th {
    background: #f0f5ff;
    color: #1a56a0;
    font-weight: 500;
    padding: 8px 6px;
    text-align: center;
    border-bottom: 1px solid #d0ddf5;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.15s;
  }

  tbody tr:hover { background: #fafbff; }

  tbody td {
    padding: 6px 4px;
    text-align: center;
    vertical-align: middle;
  }

  .month-label {
    font-weight: 500;
    color: #374151;
    white-space: nowrap;
  }

  input[type="number"] {
    width: 100%;
    padding: 5px 6px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 0.85rem;
    font-family: inherit;
    text-align: right;
    color: #2d3142;
    background: #fff;
    transition: border-color 0.15s, box-shadow 0.15s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    outline: none;
    border-color: #1a56a0;
    box-shadow: 0 0 0 3px rgba(26,86,160,0.12);
  }

  .result-cell {
    font-weight: 500;
    color: #374151;
  }

  .result-cell.empty { color: #c0c7d0; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-top: 0.5rem;
  }

  .summary-item {
    background: #f0f5ff;
    border-radius: 10px;
    padding: 1rem 1rem 0.75rem;
    text-align: center;
  }

  .summary-item .label {
    font-size: 0.75rem;
    color: #4b72b0;
    margin-bottom: 6px;
  }

  .summary-item .value {
    font-size: 1.6rem;
    font-weight: 700;
    color: #1a56a0;
    line-height: 1;
  }

  .summary-item .unit {
    font-size: 0.75rem;
    color: #4b72b0;
    margin-top: 4px;
  }

  .summary-item.highlight {
    background: #1a56a0;
  }

  .summary-item.highlight .label,
  .summary-item.highlight .unit { color: #a8c4e8; }

  .summary-item.highlight .value { color: #fff; }

  .formula-note {
    font-size: 0.75rem;
    color: #9ca3af;
    margin-top: 1rem;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    table { font-size: 0.78rem; }
    thead th { padding: 6px 3px; font-size: 0.75rem; }
    input[type="number"] { font-size: 0.78rem; padding: 4px 3px; }
    .summary-item .value { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<header>
  <h1>平均工賃計算ツール</h1>
  <p>就労継続支援B型｜月ごとに入力して年間平均工賃を算出します</p>
</header>

<div class="container">

  <div class="card">
    <h2>月別入力</h2>
    <p class="note">各月の数字を入力してください。入力した月だけで集計します。</p>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>月</th>
            <th>工賃総額（円）</th>
            <th>延べ人数（人）</th>
            <th>開所日数（日）</th>
            <th>平均利用者数</th>
            <th>平均工賃（円）</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>年間集計</h2>
    <div class="summary-grid">
      <div class="summary-item">
        <div class="label">工賃総額合計</div>
        <div class="value" id="sum-total">—</div>
        <div class="unit">円</div>
      </div>
      <div class="summary-item">
        <div class="label">集計月数</div>
        <div class="value" id="count-months">—</div>
        <div class="unit">ヶ月</div>
      </div>
      <div class="summary-item highlight">
        <div class="label">年間平均工賃</div>
        <div class="value" id="annual-avg">—</div>
        <div class="unit">円 / 月</div>
      </div>
    </div>
    <p class="formula-note" id="formula-note"></p>
  </div>

</div>

<script>
const months = ['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月','3月'];
const data = Array.from({length: 12}, () => ({total: '', nobe: '', days: ''}));

function buildTable() {
  const tbody = document.getElementById('table-body');
  months.forEach((m, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="month-label">${m}</td>
      <td><input type="number" min="0" placeholder="—" oninput="update(${i},'total',this.value)"></td>
      <td><input type="number" min="0" placeholder="—" oninput="update(${i},'nobe',this.value)"></td>
      <td><input type="number" min="1" placeholder="—" oninput="update(${i},'days',this.value)"></td>
      <td class="result-cell empty" id="avg-u-${i}">—</td>
      <td class="result-cell empty" id="avg-w-${i}">—</td>
    `;
    tbody.appendChild(tr);
  });
}

function update(i, field, val) {
  data[i][field] = val;
  calcAll();
}

function calcAll() {
  let sumTotal = 0, sumAvgUsers = 0, validMonths = 0;

  months.forEach((m, i) => {
    const total = parseFloat(data[i].total);
    const nobe  = parseFloat(data[i].nobe);
    const days  = parseFloat(data[i].days);
    const uCell = document.getElementById('avg-u-' + i);
    const wCell = document.getElementById('avg-w-' + i);

    if (!isNaN(total) && !isNaN(nobe) && !isNaN(days) && days > 0) {
      const avgU = nobe / days;
      const avgW = avgU > 0 ? total / avgU : 0;
      uCell.textContent = avgU.toFixed(1);
      uCell.className = 'result-cell';
      wCell.textContent = Math.round(avgW).toLocaleString();
      wCell.className = 'result-cell';
      sumTotal += total;
      sumAvgUsers += avgU;
      validMonths++;
    } else {
      uCell.textContent = '—';
      uCell.className = 'result-cell empty';
      wCell.textContent = '—';
      wCell.className = 'result-cell empty';
    }
  });

  if (validMonths > 0) {
    const annualAvgUsers = sumAvgUsers / validMonths;
    const annualAvg = annualAvgUsers > 0 ? sumTotal / annualAvgUsers : 0;
    document.getElementById('sum-total').textContent = Math.round(sumTotal).toLocaleString();
    document.getElementById('count-months').textContent = validMonths;
    document.getElementById('annual-avg').textContent = Math.round(annualAvg).toLocaleString();
    document.getElementById('formula-note').textContent =
      '計算式：工賃総額合計 ' + Math.round(sumTotal).toLocaleString() + '円 ÷ 平均利用者数の平均 ' + annualAvgUsers.toFixed(1) + '人 ＝ ' + Math.round(annualAvg).toLocaleString() + '円';
  } else {
    document.getElementById('sum-total').textContent = '—';
    document.getElementById('count-months').textContent = '—';
    document.getElementById('annual-avg').textContent = '—';
    document.getElementById('formula-note').textContent = '';
  }
}

buildTable();
</script>
</body>
</html>
